name: JPResume
options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.1.0"
  SwiftDocX:
    url: https://github.com/Techopolis/SwiftDocX
    from: "1.0.1"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.20"
  Shikisha:
    url: https://github.com/KristopherGBaker/Shikisha
    branch: main

targets:
  DocPipeline:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/DocPipeline
    dependencies:
      - package: Shikisha
    settings:
      base:
        SWIFT_VERSION: "6.2"

  jpresume:
    type: tool
    platform: macOS
    sources:
      - path: Sources/JPResume
    dependencies:
      - target: DocPipeline
      - package: swift-argument-parser
        product: ArgumentParser
      - package: Yams
      - package: SwiftDocX
      - package: ZIPFoundation
      - package: Shikisha
      - framework: AppKit
        implicit: true
      - framework: PDFKit
        implicit: true
      - framework: Vision
        implicit: true
    settings:
      base:
        SWIFT_VERSION: "6.2"
        PRODUCT_NAME: jpresume

  JPResumeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JPResumeTests
    dependencies:
      - target: jpresume
      - target: DocPipeline
    settings:
      base:
        SWIFT_VERSION: "6.2"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  jpresume:
    build:
      targets:
        jpresume: all
        JPResumeTests: [test]
    run:
      executable: jpresume
    test:
      targets:
        - name: JPResumeTests
