name: JPResume
options:
  createIntermediateGroups: true
  defaultConfig: Debug
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"
  Yams:
    url: https://github.com/jpsim/Yams
    from: "5.1.0"

targets:
  jpresume:
    type: tool
    platform: macOS
    sources:
      - path: Sources/JPResume
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser
      - package: Yams
      - framework: AppKit
        implicit: true
    settings:
      base:
        SWIFT_VERSION: "6.2"
        PRODUCT_NAME: jpresume

  JPResumeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JPResumeTests
    dependencies:
      - target: jpresume
    settings:
      base:
        SWIFT_VERSION: "6.2"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  jpresume:
    build:
      targets:
        jpresume: all
        JPResumeTests: [test]
    run:
      executable: jpresume
    test:
      targets:
        - name: JPResumeTests
