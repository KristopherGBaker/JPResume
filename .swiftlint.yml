included:
  - Sources
  - Tests

disabled_rules:
  - trailing_comma
  - opening_brace
  - large_tuple
  - for_where
  - statement_position

opt_in_rules:
  - empty_count
  - closure_spacing

line_length:
  warning: 180
  error: 250

type_body_length:
  warning: 500
  error: 800

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 100
  error: 200

function_parameter_count:
  warning: 8
  error: 12

cyclomatic_complexity:
  warning: 20
  error: 30

identifier_name:
  min_length: 1
  excluded:
    - x
    - y
    - i
    - m
    - w
    - h
