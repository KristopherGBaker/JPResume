name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - name: Install Swift 6.3
        uses: SwiftyLab/setup-swift@latest
        with:
          swift-version: "6.3.2"
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        # Vision OCR tests hang on headless CI runners (no WindowServer); skip them here.
        run: swift test
        env:
          JPRESUME_SKIP_OCR_TESTS: "1"

  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --strict --config .swiftlint.yml
