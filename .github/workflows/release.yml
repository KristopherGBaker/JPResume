name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build universal binary and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build arm64
        run: swift build -c release --arch arm64

      - name: Build x86_64
        run: swift build -c release --arch x86_64

      - name: Create universal binary
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/jpresume \
            .build/x86_64-apple-macosx/release/jpresume \
            -output jpresume
          chmod +x jpresume

      - name: Compute checksum
        run: shasum -a 256 jpresume > jpresume.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            jpresume
            jpresume.sha256
          generate_release_notes: true
